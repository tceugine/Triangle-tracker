<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Triangle Checker</title>
    <link rel="stylesheet" href="Styles/bootstrap-5.0.2-dist (1)/bootstrap-5.0.2-dist/css/bootstrap.css">
<link rel="stylesheet" href="Styles/bootstrap-5.0.2-dist (1)/bootstrap-5.0.2-dist/js/bootstrap.js">
<link rel="stylesheet" href="Scripts/script.js">
<link rel="stylesheet" href="Styles/styles.css">
</head>
<body>
    <div class="container">
        <h2>Triangle Type Calculator</h2>
        <div class="inputs">
            <input type="number" id="sideA" placeholder="Side A">
            <input type="number" id="sideB" placeholder="Side B">
            <input type="number" id="sideC" placeholder="Side C">
        </div>
        <button onclick="checkTriangle()">Check Type</button>
        <div id="result">Enter values to begin</div>
    </div>

    <script src="/Scripts/script.js"></script>
</body>
</html>
